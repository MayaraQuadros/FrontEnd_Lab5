<h2>Student App</h2>
<!-- display all students -->
<ul>
@for(x of students; track x){
  <li>{{x.id}}, {{x.name}}</li>
}
</ul>

<!-- display weather information -->
<h2>Weather in Galway</h2>
<ul>
  @for(w of weather; track w){
  <li>{{w.main}}, {{w.description}}</li>
  <li>{{temperature}}</li>
}
</ul>
<br>
